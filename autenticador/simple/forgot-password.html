<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - Autenticador Componentes</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="auth-layout">

    <!-- FLOW 1: REQUEST EMAIL -->
    <div class="auth-card" id="card-request">
      <div class="auth-header">
        <h2>Recuperar contraseña</h2>
        <p>Ingrese su correo para validar.</p>
      </div>

      <div style="background: var(--ms-bg-main); border: 1px solid var(--ms-border); padding: 12px; margin-bottom: 24px; font-size: 13px; color: var(--ms-text-secondary); border-radius: var(--ms-radius);">
        Este demo validará que el correo exista localmente en el Storage y avanzará al paso de reajuste automático.
      </div>

      <form id="forgot-form">
        <div class="form-group">
          <label class="control-label" for="forgot-email">Correo electrónico</label>
          <input type="email" id="forgot-email" class="form-control" autocomplete="email">
          <span id="forgot-email-error" class="error-msg"></span>
        </div>

        <button type="submit" id="btn-request" class="btn btn-primary" style="margin-bottom: 8px;">Verificar correo</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='./index.html'">Volver</button>
      </form>
    </div>

    <!-- FLOW 2: CONFIRM NEW PWD -->
    <div class="auth-card hidden" id="card-reset">
      <div class="auth-header">
        <h2>Ingresar nueva clave</h2>
        <p>El correo ha sido validado en memoria.</p>
      </div>

      <form id="reset-form">
        <div class="form-group">
          <label class="control-label" for="reset-password">Nueva contraseña</label>
          <input type="password" id="reset-password" class="form-control" autocomplete="new-password">
          <span id="reset-password-error" class="error-msg"></span>
        </div>

        <button type="submit" id="btn-reset" class="btn btn-primary" style="margin-bottom: 8px;">Actualizar acceso</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='./index.html'">Cancelar</button>
      </form>
    </div>

  </div>

  <div id="toast-container"></div>
  <script type="module" src="./js/pages/forgot.js"></script>
</body>
</html>
